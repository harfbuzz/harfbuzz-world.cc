<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HarfBuzz World — the ffmpeg of text rendering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=PT+Sans:wght@400;700&family=Prata&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/site.css">
</head>
<body>
<header>
  <h1>HarfBuzz World</h1>
  <p class="tagline">The ffmpeg of text rendering.</p>
  <nav class="tabs">
    <a href="#shape"  class="tab" data-demo="shape">shape</a>
    <a href="#vector" class="tab" data-demo="vector">vector</a>
    <a href="#raster" class="tab" data-demo="raster">raster</a>
  </nav>
</header>

<main>
  <div class="controls" id="shared-controls">
    <label>Text:
      <input id="text" type="text" value="Shape me." size="40">
    </label>
    <label>Size:
      <input id="size" type="number" value="48" min="8" max="200">
    </label>
  </div>

  <section class="demo" id="demo-shape">
    <div id="shape-render" class="render"></div>
    <h2>Glyph data</h2>
    <pre id="shape-glyphs"></pre>
  </section>

  <section class="demo" id="demo-vector" hidden>
    <div class="controls demo-controls">
      <a id="vector-dl-svg" href="#" download="text.svg">Download SVG</a>
      <a id="vector-dl-pdf" href="#" download="text.pdf">Download PDF</a>
    </div>
    <div id="vector-render" class="render"></div>
  </section>

  <section class="demo" id="demo-raster" hidden>
    <canvas id="raster-canvas" class="render"></canvas>
  </section>
</main>

<footer>
  <p>© HarfBuzz Authors ·
     <a href="https://github.com/harfbuzz/harfbuzz">GitHub</a></p>
</footer>

<script src="hb-world.js"></script>
<script src="js/app.js"></script>
</body>
</html>
