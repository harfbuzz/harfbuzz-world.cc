<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HarfBuzz World — your one-stop HarfBuzz shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=PT+Sans:wght@400;700&family=Prata&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/site.css">
</head>
<body>
<header>
  <h1>HarfBuzz World</h1>
  <p class="tagline">Your one-stop HarfBuzz shop.</p>
  <nav class="tabs">
    <a href="#shape"  class="tab" data-demo="shape">shape</a>
    <a href="#vector" class="tab" data-demo="vector">vector</a>
    <a href="#raster" class="tab" data-demo="raster">raster</a>
  </nav>
</header>

<main>
  <div class="controls" id="shared-controls">
    <label>Text:
      <input id="text" type="text" value="Shape me." size="40">
    </label>
    <label>Size:
      <input id="size" type="number" value="48" min="1" max="2048">
    </label>
    <div class="font-picker">
      <button class="font-button" type="button" id="font-button">
        <span class="font-prefix">Font:</span>
        <span id="font-name">NotoSans-Regular</span>
      </button>
      <div class="font-menu" id="font-menu" hidden>
        <div class="font-menu-row">
          <label for="font-shipped">Shipped</label>
          <select id="font-shipped">
            <option value="fonts/NotoSans-Regular.ttf"   data-name="NotoSans-Regular">Noto Sans</option>
            <option value="fonts/NotoSansArabic.ttf"     data-name="NotoSansArabic">Noto Sans Arabic</option>
            <option value="fonts/NotoSansDevanagari.ttf" data-name="NotoSansDevanagari">Noto Sans Devanagari</option>
          </select>
        </div>
        <div class="font-menu-row">
          <label for="font-input">File</label>
          <input id="font-input" type="file" accept=".ttf,.otf,.ttc,.woff,.woff2">
        </div>
        <div class="font-menu-row">
          <label for="font-url">URL</label>
          <input id="font-url" type="url" placeholder="https://…/Font.ttf">
          <button id="font-url-load" type="button">Load</button>
        </div>
      </div>
    </div>
  </div>
  <div id="drop-overlay">drop font file</div>

  <section class="demo" id="demo-shape">
    <div id="shape-render" class="render"></div>
    <h2>Glyph data</h2>
    <pre id="shape-glyphs"></pre>
  </section>

  <section class="demo" id="demo-vector" hidden>
    <div class="controls demo-controls">
      <a id="vector-dl-svg" href="#" download="text.svg">Download SVG</a>
      <a id="vector-dl-pdf" href="#" download="text.pdf">Download PDF</a>
    </div>
    <div id="vector-render" class="render"></div>
  </section>

  <section class="demo" id="demo-raster" hidden>
    <div class="render"><canvas id="raster-canvas"></canvas></div>
  </section>
</main>

<footer>
  <p>Powered by
     <a href="https://github.com/harfbuzz/harfbuzz">HarfBuzz</a> —
     the <em>ffmpeg</em> of text rendering</p>
</footer>

<script src="hb-world.js"></script>
<script src="js/app.js"></script>
</body>
</html>
